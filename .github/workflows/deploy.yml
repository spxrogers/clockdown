name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save site files (all static assets, excluding VCS/CI/docs).
          # Generic copy so new pages/dirs deploy automatically.
          mkdir -p /tmp/site-build
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            ./ /tmp/site-build/

          # Check out gh-pages branch
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          # Replace root files but preserve pr/ directory
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'pr' -exec rm -rf {} +
          cp -r /tmp/site-build/* .

          git add -A
          git diff --cached --quiet || git commit -m "Deploy from main ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Push with rebase-retry to survive concurrent gh-pages writers
          for attempt in 1 2 3 4 5; do
            if git push origin gh-pages; then
              echo "Pushed on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Push failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Push rejected; rebasing onto latest gh-pages (attempt ${attempt})..."
            git fetch origin gh-pages
            git rebase origin/gh-pages || { git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done
