name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

# Share the "pages" group with deploy.yml so production deploys and PR
# preview deploy/cleanup never write to gh-pages concurrently.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Deploy to pr/ subdirectory on gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          # Create a temporary directory with the PR build (all static pages,
          # excluding VCS/CI/docs and the production-only CNAME). Generic copy
          # so new pages/dirs preview automatically.
          mkdir -p /tmp/pr-build
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='CNAME' \
            ./ /tmp/pr-build/

          # Check out gh-pages branch (or create it)
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          # Copy PR build into pr/{number}/ (replace any prior contents)
          rm -rf "pr/${PR_NUMBER}"
          mkdir -p "pr/${PR_NUMBER}"
          cp -r /tmp/pr-build/. "pr/${PR_NUMBER}/"

          # Commit and push (rebase-retry to survive concurrent gh-pages writers)
          git add "pr/${PR_NUMBER}"
          git commit -m "Deploy preview for PR #${PR_NUMBER}" --allow-empty
          for attempt in 1 2 3 4 5; do
            if git push origin gh-pages; then
              echo "Pushed on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Push failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Push rejected; rebasing onto latest gh-pages (attempt ${attempt})..."
            git fetch origin gh-pages
            git rebase origin/gh-pages || { git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://clockdown.us/pr/${prNumber}/`;
            const body = `🔗 **Preview deployed:** ${previewUrl}`;

            // Check for existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed:')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove PR preview
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d "pr/${PR_NUMBER}" ]; then
            git rm -rf "pr/${PR_NUMBER}"
            git commit -m "Remove preview for PR #${PR_NUMBER}"
            # Push with rebase-retry to survive concurrent gh-pages writers
            # (e.g. the production deploy triggered by the same merge).
            for attempt in 1 2 3 4 5; do
              if git push origin gh-pages; then
                echo "Pushed on attempt ${attempt}"
                break
              fi
              if [ "${attempt}" -eq 5 ]; then
                echo "Push failed after ${attempt} attempts" >&2
                exit 1
              fi
              echo "Push rejected; rebasing onto latest gh-pages (attempt ${attempt})..."
              git fetch origin gh-pages
              git rebase origin/gh-pages || { git rebase --abort; exit 1; }
              sleep $((attempt * 2))
            done
          fi
