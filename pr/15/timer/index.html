<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GPPMHQSYHJ"></script>

<title>Clockdown Timer — Countdown From Any Duration</title>
<meta name="description" content="A beautiful, shareable countdown timer with pause, resume, and reset. Set a duration, name it, pick a vibe. No signup, no ads, no bloat.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-border: rgba(255,255,255,0.08);
  --surface-hover: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --text-dim: rgba(255,255,255,0.5);
  --accent: #c084fc;
  --accent-bright: #e879f9;
  --accent-glow: rgba(192,132,252,0.25);
  --gradient: linear-gradient(135deg, #c084fc, #e879f9, #fb7185);
  --radius: 16px;
  --radius-sm: 10px;
}

html { height: 100%; }

body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---- ANIMATED GRADIENT BACKGROUND ---- */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
  transition: background 0.6s ease;
}
.bg-gradient::before {
  content: '';
  position: absolute;
  width: 150vmax;
  height: 150vmax;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 30% 40%, rgba(192,132,252,0.12) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(251,113,133,0.08) 0%, transparent 50%),
              radial-gradient(circle at 50% 50%, rgba(232,121,249,0.06) 0%, transparent 60%);
  animation: bgPulse 12s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  100% { transform: translate(-50%, -50%) scale(1.1) rotate(15deg); }
}

/* ---- CREATOR MODE — LIVE BACKDROP LAYOUT ---- */
#creator {
  display: none;
  flex-direction: column;
  min-height: 100vh;
}
#creator.active { display: flex; }

.live-preview {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px 20px 32px;
  min-height: 45vh;
  gap: 16px;
  transition: all 0.3s ease;
}

.lp-badge {
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  padding: 4px 12px;
  border: 1px solid var(--surface-border);
  border-radius: 999px;
  background: var(--surface);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.lp-hint {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-dim);
  max-width: 340px;
  line-height: 1.4;
}

.lp-emoji { font-size: 3rem; animation: emojiFloat 3s ease-in-out infinite; transition: all 0.2s; }
@keyframes emojiFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

.lp-name {
  font-size: clamp(1.2rem, 4vw, 2rem);
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
  max-width: 500px;
  min-height: 1.4em;
}
.lp-name.placeholder { opacity: 0.3; }

.lp-timer { display: flex; gap: clamp(6px, 2vw, 14px); align-items: center; }
.lp-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.lp-digits {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 12px;
  padding: clamp(8px, 2vw, 16px) clamp(12px, 3vw, 24px);
  min-width: clamp(50px, 12vw, 90px);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}
.lp-digits::after {
  content: '';
  position: absolute;
  left: 10%; right: 10%; top: 50%;
  height: 1px;
  background: rgba(255,255,255,0.05);
}
.lp-val {
  font-size: clamp(1.6rem, 6vw, 3rem);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.lp-label {
  font-size: clamp(0.55rem, 1.5vw, 0.7rem);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}
.lp-colon {
  font-size: clamp(1.2rem, 4vw, 2rem);
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 22px;
  animation: colonPulse 1s ease-in-out infinite;
}
@keyframes colonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Creator form panel */
.creator-panel {
  flex: 1;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--surface-border);
  border-radius: 24px 24px 0 0;
  padding: 28px 20px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  max-width: 100%;
}

.panel-header { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 480px; }
.logo {
  font-size: 1.6rem;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.03em;
}
.logo a { color: inherit; text-decoration: none; }
.tagline { color: var(--text-dim); font-size: 0.78rem; font-style: italic; }

/* Tools nav */
.tools-nav { display: flex; gap: 8px; width: 100%; max-width: 480px; flex-wrap: wrap; }
.tool-link {
  font-size: 0.72rem; font-weight: 600; padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--surface-border); background: var(--surface);
  color: var(--text-dim); text-decoration: none; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.tool-link:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.tool-link.active { color: var(--text); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

.form-body { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }

.field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.field input[type="text"] {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field input::placeholder { color: var(--text-dim); }

/* ---- DURATION PICKER ---- */
.dur-picker {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
}
.dur-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.dur-col button {
  background: none; border: none; color: var(--text-dim);
  font-size: 0.85rem; cursor: pointer; padding: 4px 14px;
  border-radius: 6px; transition: all 0.12s; line-height: 1;
}
.dur-col button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.dur-val {
  width: 58px; text-align: center;
  font-size: 1.9rem; font-weight: 700; font-variant-numeric: tabular-nums;
  background: transparent; border: none; outline: none; padding: 4px 0;
  font-family: inherit;
  color: var(--accent-bright);
}
.dur-val::-webkit-outer-spin-button, .dur-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.dur-unit-label {
  font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-dim); margin-top: 2px;
}
.dur-sep { font-size: 1.6rem; font-weight: 700; color: var(--text-dim); padding-bottom: 26px; }

.presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.preset-btn {
  font-size: 0.78rem; font-weight: 600; padding: 7px 12px; border-radius: 999px;
  border: 1px solid var(--surface-border); background: rgba(255,255,255,0.05);
  color: var(--text-dim); cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.preset-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

/* Emoji picker + custom input */
.emoji-section { display: flex; flex-direction: column; gap: 10px; }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-btn {
  width: 40px; height: 40px;
  border-radius: 8px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.05);
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.emoji-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
.emoji-btn.selected { border-color: var(--accent); background: var(--accent-glow); transform: scale(1.1); }
.emoji-custom-row { display: flex; align-items: center; gap: 8px; }
.emoji-custom-row span { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; }
.emoji-custom-input {
  flex: 1;
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--surface-border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 120px;
}
.emoji-custom-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.emoji-custom-input::placeholder { opacity: 0.4; }

/* Theme / vibe selector */
.theme-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.theme-swatch {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.theme-swatch::before { content: ''; position: absolute; inset: 3px; border-radius: 8px; }
.theme-swatch:hover { transform: scale(1.08); }
.theme-swatch.selected { border-color: #fff; transform: scale(1.08); }
.theme-swatch[data-theme="galaxy"]::before { background: linear-gradient(135deg, #c084fc, #e879f9, #fb7185); }
.theme-swatch[data-theme="sunset"]::before { background: linear-gradient(135deg, #fb923c, #f97316, #ef4444); }
.theme-swatch[data-theme="ocean"]::before { background: linear-gradient(135deg, #38bdf8, #22d3ee, #2dd4bf); }
.theme-swatch[data-theme="neon"]::before { background: linear-gradient(135deg, #a3e635, #facc15, #f97316); }
.theme-swatch[data-theme="minimal"]::before { background: linear-gradient(135deg, #71717a, #a1a1aa, #d4d4d8); }
.theme-swatch-label { display: block; font-size: 0.65rem; color: var(--text-dim); text-align: center; margin-top: 4px; font-weight: 500; }
.theme-option { display: flex; flex-direction: column; align-items: center; }

/* Buttons */
.btn-row { display: flex; gap: 10px; width: 100%; max-width: 480px; }
.btn-primary {
  flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm);
  background: var(--gradient); color: #fff; font-family: inherit;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  overflow: hidden;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  padding: 14px 20px; border: 1px solid var(--surface-border);
  border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
  font-family: inherit; font-size: 0.95rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-secondary:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); }

/* Footer */
.footer {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  color: var(--text-dim);
  font-size: 0.8rem;
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
.footer span a { font-weight: 600; }
.footer span a:hover { color: var(--text); }
.footer .gh-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--surface-border);
  background: var(--surface);
  transition: all 0.15s;
}
.footer .gh-link:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); color: var(--text); transform: translateY(-1px); }
.footer .gh-link svg { width: 17px; height: 17px; fill: currentColor; }

/* ---- FULL TIMER MODE ---- */
#timer {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; padding: 32px 20px;
  width: 100%; min-height: 100vh; text-align: center;
}
#timer.active { display: flex; }

.event-emoji { font-size: 3.5rem; animation: emojiFloat 3s ease-in-out infinite; }
.event-name {
  font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 700;
  background: var(--gradient); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.2; max-width: 600px;
}

.timer-grid { display: flex; gap: clamp(8px, 3vw, 20px); align-items: center; }
.timer-grid.finished { animation: pulseGlow 1.2s ease-in-out infinite; }
@keyframes pulseGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
.timer-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.timer-digits {
  position: relative; background: var(--surface);
  border: 1px solid var(--surface-border); border-radius: var(--radius);
  padding: clamp(12px, 3vw, 24px) clamp(16px, 4vw, 32px);
  min-width: clamp(60px, 15vw, 110px);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); overflow: hidden;
}
.timer-digits::after {
  content: ''; position: absolute; left: 8%; right: 8%; top: 50%;
  height: 1px; background: rgba(255,255,255,0.06);
}
.digit-value {
  font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 700;
  line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  background: var(--gradient); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}
.digit-label {
  font-size: clamp(0.6rem, 2vw, 0.8rem); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
}
.timer-colon {
  font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 700;
  color: var(--text-dim); margin-bottom: 28px; animation: colonPulse 1s ease-in-out infinite;
}

/* Timer transport controls */
.transport { display: flex; gap: 12px; align-items: center; margin-top: 4px; }
.transport .btn-control {
  padding: 13px 30px; border-radius: 999px; border: none;
  background: var(--gradient); color: #fff; font-family: inherit;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  min-width: 130px;
}
.transport .btn-control:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
.transport .btn-ghost {
  padding: 13px 24px; border-radius: 999px; border: 1px solid var(--surface-border);
  background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.transport .btn-ghost:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.2); }
.transport .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

.timer-actions { display: flex; gap: 12px; margin-top: 4px; }
.timer-actions button {
  padding: 10px 20px; border-radius: 999px; border: 1px solid var(--surface-border);
  background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.timer-actions button:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.2); }

.celebration-text {
  display: none; font-size: clamp(2rem, 8vw, 4rem); font-weight: 700;
  background: var(--gradient); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  animation: celebrationPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes celebrationPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

/* Toast */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(20,20,30,0.9); border: 1px solid var(--surface-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  color: var(--text); padding: 12px 24px; border-radius: 999px;
  font-family: inherit; font-size: 0.9rem; font-weight: 500;
  pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
  opacity: 0; z-index: 100;
}
.toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

#confetti-canvas { position: fixed; inset: 0; z-index: 50; pointer-events: none; }

@keyframes digitFlipIn { 0% { transform: translateY(-30%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
.digit-flip { animation: digitFlipIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }

/* Responsive */
@media (max-width: 480px) {
  .live-preview { min-height: 38vh; padding: 32px 16px 24px; }
  .lp-timer { gap: 3px; }
  .lp-colon { margin: 0 -1px 22px; font-size: 1rem; }
  .lp-digits { padding: 6px 6px; min-width: 46px; border-radius: 8px; }
  .lp-val { font-size: 1.4rem; }
  .creator-panel { padding: 20px 16px 32px; border-radius: 20px 20px 0 0; }
  .timer-grid { gap: 4px; }
  .timer-colon { margin: 0 -2px 28px; font-size: 1.2rem; }
  .timer-digits { padding: 10px 8px; min-width: 56px; border-radius: 12px; }
  .transport { flex-wrap: wrap; justify-content: center; }
  .timer-actions { flex-direction: column; width: 100%; max-width: 260px; }
  .timer-actions button { width: 100%; }
  .btn-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- ============ CREATOR MODE ============ -->
<div id="creator">
  <div class="live-preview" id="live-preview">
    <div class="lp-badge">Preview</div>
    <div class="lp-emoji" id="lp-emoji">⏲️</div>
    <div class="lp-name placeholder" id="lp-name">Your Timer Name</div>
    <div class="lp-timer" id="lp-timer">
      <div class="lp-unit"><div class="lp-digits"><span class="lp-val" id="lp-hours">00</span></div><span class="lp-label">Hours</span></div>
      <span class="lp-colon">:</span>
      <div class="lp-unit"><div class="lp-digits"><span class="lp-val" id="lp-mins">00</span></div><span class="lp-label">Min</span></div>
      <span class="lp-colon">:</span>
      <div class="lp-unit"><div class="lp-digits"><span class="lp-val" id="lp-secs">00</span></div><span class="lp-label">Sec</span></div>
    </div>
    <div class="lp-hint">Set a duration below, then start, pause &amp; share ↓</div>
  </div>

  <div class="creator-panel">
    <div class="panel-header">
      <div class="logo"><a href="../">clockdown</a></div>
      <div class="tagline">timers that don't suck</div>
    </div>

    <nav class="tools-nav">
      <a class="tool-link" href="../">⏰ Countdown</a>
      <a class="tool-link active" href="./">⏲️ Timer</a>
      <a class="tool-link" href="../stopwatch/">⏱️ Stopwatch</a>
    </nav>

    <div class="form-body">
      <div class="field">
        <label>Timer Name</label>
        <input type="text" id="inp-name" placeholder="Pomodoro Focus" maxlength="80" autocomplete="off">
      </div>

      <div class="field">
        <label>Duration</label>
        <div class="dur-picker">
          <div class="dur-col">
            <button type="button" data-u="h" data-dir="1">▲</button>
            <input class="dur-val" id="dur-h" value="00" inputmode="numeric" maxlength="3" aria-label="Hours">
            <button type="button" data-u="h" data-dir="-1">▼</button>
            <span class="dur-unit-label">Hours</span>
          </div>
          <span class="dur-sep">:</span>
          <div class="dur-col">
            <button type="button" data-u="m" data-dir="1">▲</button>
            <input class="dur-val" id="dur-m" value="25" inputmode="numeric" maxlength="2" aria-label="Minutes">
            <button type="button" data-u="m" data-dir="-1">▼</button>
            <span class="dur-unit-label">Min</span>
          </div>
          <span class="dur-sep">:</span>
          <div class="dur-col">
            <button type="button" data-u="s" data-dir="1">▲</button>
            <input class="dur-val" id="dur-s" value="00" inputmode="numeric" maxlength="2" aria-label="Seconds">
            <button type="button" data-u="s" data-dir="-1">▼</button>
            <span class="dur-unit-label">Sec</span>
          </div>
        </div>
        <div class="presets" id="presets">
          <button class="preset-btn" type="button" data-sec="60">1 min</button>
          <button class="preset-btn" type="button" data-sec="300">5 min</button>
          <button class="preset-btn" type="button" data-sec="600">10 min</button>
          <button class="preset-btn" type="button" data-sec="900">15 min</button>
          <button class="preset-btn" type="button" data-sec="1500">25 min</button>
          <button class="preset-btn" type="button" data-sec="3600">1 hour</button>
          <button class="preset-btn" type="button" data-sec="5400">1 hr 30 min</button>
          <button class="preset-btn" type="button" data-sec="7200">2 hours</button>
        </div>
      </div>

      <div class="field">
        <label>Icon</label>
        <div class="emoji-section">
          <div class="emoji-grid" id="emoji-grid"></div>
          <div class="emoji-custom-row">
            <span>or type:</span>
            <input type="text" class="emoji-custom-input" id="emoji-custom" placeholder="🦄" maxlength="8">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Vibe</label>
        <div class="theme-grid" id="theme-grid"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-create">Copy Share Link</button>
      <button class="btn-secondary" id="btn-fullscreen">Start ↗</button>
    </div>

    <footer class="footer">
      <span>made with <a href="../motivation/">spite</a> by <a href="https://spxrogers.com/" target="_blank" rel="noopener">steven</a></span>
      <a class="gh-link" href="https://github.com/spxrogers/clockdown" target="_blank" rel="noopener" aria-label="View clockdown on GitHub" title="View on GitHub">

      </a>
    </footer>
  </div>
</div>

<!-- ============ FULL TIMER MODE ============ -->
<div id="timer">
  <div class="event-emoji" id="tm-emoji"></div>
  <h1 class="event-name" id="tm-name"></h1>
  <div class="timer-grid" id="tm-grid">
    <div class="timer-unit"><div class="timer-digits"><span class="digit-value" id="tm-hours">00</span></div><span class="digit-label">Hours</span></div>
    <span class="timer-colon">:</span>
    <div class="timer-unit"><div class="timer-digits"><span class="digit-value" id="tm-mins">00</span></div><span class="digit-label">Minutes</span></div>
    <span class="timer-colon">:</span>
    <div class="timer-unit"><div class="timer-digits"><span class="digit-value" id="tm-secs">00</span></div><span class="digit-label">Seconds</span></div>
  </div>
  <div class="celebration-text" id="tm-celebration">Time's up! ⏲️</div>
  <div class="transport">
    <button class="btn-control" id="btn-toggle">Start</button>
    <button class="btn-ghost" id="btn-reset" disabled>Reset</button>
  </div>
  <div class="timer-actions">
    <button id="btn-share">Share</button>
    <button id="btn-new">Create Your Own</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>
<div id="ad-slot"></div>

<script>
(function() {
  'use strict';

  const EMOJIS = ['⏲️','🍅','💪','🧘','☕','🍳','📚','🎯','🏃','🎮','🛁','🔥','⏰','🥚','🎬','🎵'];
  const THEMES = [
    { id: 'galaxy', label: 'Galaxy' },
    { id: 'sunset', label: 'Sunset' },
    { id: 'ocean',  label: 'Ocean'  },
    { id: 'neon',   label: 'Neon'   },
    { id: 'minimal',label: 'Minimal'},
  ];
  const THEME_STYLES = {
    galaxy:  { accent: '#c084fc', accentBright: '#e879f9', gradient: 'linear-gradient(135deg, #c084fc, #e879f9, #fb7185)', bgGrad: 'radial-gradient(circle at 30% 40%, rgba(192,132,252,0.12) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(251,113,133,0.08) 0%, transparent 50%)' },
    sunset:  { accent: '#fb923c', accentBright: '#f97316', gradient: 'linear-gradient(135deg, #fb923c, #f97316, #ef4444)', bgGrad: 'radial-gradient(circle at 30% 40%, rgba(251,146,60,0.15) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(239,68,68,0.10) 0%, transparent 50%)' },
    ocean:   { accent: '#38bdf8', accentBright: '#22d3ee', gradient: 'linear-gradient(135deg, #38bdf8, #22d3ee, #2dd4bf)', bgGrad: 'radial-gradient(circle at 30% 40%, rgba(56,189,248,0.15) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(45,212,191,0.10) 0%, transparent 50%)' },
    neon:    { accent: '#a3e635', accentBright: '#facc15', gradient: 'linear-gradient(135deg, #a3e635, #facc15, #f97316)', bgGrad: 'radial-gradient(circle at 30% 40%, rgba(163,230,53,0.15) 0%, transparent 50%), radial-gradient(circle at 70% 60%, rgba(249,115,22,0.10) 0%, transparent 50%)' },
    minimal: { accent: '#a1a1aa', accentBright: '#d4d4d8', gradient: 'linear-gradient(135deg, #a1a1aa, #d4d4d8, #f4f4f5)', bgGrad: 'radial-gradient(circle at 50% 50%, rgba(161,161,170,0.06) 0%, transparent 50%)' },
  };

  // ---- STATE ----
  let selectedEmoji = EMOJIS[0];
  let selectedTheme = 'galaxy';
  let durH = 0, durM = 25, durS = 0;
  let previewInterval = null;

  // Runtime timer state
  let totalMs = 0;        // configured duration
  let remainingMs = 0;    // remaining when paused / at start
  let endAt = 0;          // wall-clock instant the timer hits zero (while running)
  let running = false;
  let finished = false;
  let tickInterval = null;
  let confettiActive = false;
  let autoStart = false;  // when the creator hits Start ↗, run the timer on arrival

  const $ = (s) => document.querySelector(s);
  const creator = $('#creator');
  const timerEl = $('#timer');
  const inpName = $('#inp-name');
  const emojiGrid = $('#emoji-grid');
  const emojiCustom = $('#emoji-custom');
  const themeGrid = $('#theme-grid');
  const btnCreate = $('#btn-create');
  const btnFullscreen = $('#btn-fullscreen');
  const btnToggle = $('#btn-toggle');
  const btnReset = $('#btn-reset');
  const btnShare = $('#btn-share');
  const btnNew = $('#btn-new');
  const toast = $('#toast');

  // ---- INIT ----
  function init() {
    initDurationPicker();
    buildEmojiGrid();
    buildThemeGrid();
    bindEvents();
    route();
  }

  // ---- DURATION PICKER ----
  function clampDur() {
    durH = Math.max(0, Math.min(99, durH | 0));
    durM = Math.max(0, Math.min(59, durM | 0));
    durS = Math.max(0, Math.min(59, durS | 0));
  }
  function totalSeconds() { return durH * 3600 + durM * 60 + durS; }
  function setFromSeconds(sec) {
    sec = Math.max(0, Math.min(99 * 3600 + 59 * 60 + 59, Math.floor(sec)));
    durH = Math.floor(sec / 3600);
    durM = Math.floor((sec % 3600) / 60);
    durS = sec % 60;
    syncDurInputs();
    updateLivePreview();
  }
  function syncDurInputs() {
    $('#dur-h').value = String(durH).padStart(2, '0');
    $('#dur-m').value = String(durM).padStart(2, '0');
    $('#dur-s').value = String(durS).padStart(2, '0');
  }
  function initDurationPicker() {
    syncDurInputs();
    document.querySelectorAll('.dur-col button').forEach(btn => {
      btn.addEventListener('click', () => {
        const u = btn.dataset.u, dir = parseInt(btn.dataset.dir);
        if (u === 'h') durH += dir;
        else if (u === 'm') durM += dir;
        else durS += dir;
        clampDur();
        syncDurInputs();
        updateLivePreview();
      });
    });
    [['#dur-h','h'], ['#dur-m','m'], ['#dur-s','s']].forEach(([sel, u]) => {
      const inp = $(sel);
      inp.addEventListener('input', () => {
        const v = parseInt(inp.value.replace(/[^0-9]/g, '')) || 0;
        if (u === 'h') durH = v; else if (u === 'm') durM = v; else durS = v;
        clampDur();
        updateLivePreview();
      });
      inp.addEventListener('blur', syncDurInputs);
      inp.addEventListener('focus', () => inp.select());
    });
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => setFromSeconds(parseInt(btn.dataset.sec)));
    });
  }

  // ---- EMOJI GRID ----
  function buildEmojiGrid() {
    EMOJIS.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
      btn.textContent = e;
      btn.type = 'button';
      btn.addEventListener('click', () => {
        selectedEmoji = e;
        emojiCustom.value = '';
        emojiGrid.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateLivePreview();
      });
      emojiGrid.appendChild(btn);
    });
  }

  // ---- THEME GRID ----
  function buildThemeGrid() {
    THEMES.forEach(t => {
      const opt = document.createElement('div');
      opt.className = 'theme-option';
      const swatch = document.createElement('button');
      swatch.className = 'theme-swatch' + (t.id === selectedTheme ? ' selected' : '');
      swatch.setAttribute('data-theme', t.id);
      swatch.type = 'button';
      const label = document.createElement('span');
      label.className = 'theme-swatch-label';
      label.textContent = t.label;
      swatch.addEventListener('click', () => {
        selectedTheme = t.id;
        themeGrid.querySelectorAll('.theme-swatch').forEach(b => b.classList.remove('selected'));
        swatch.classList.add('selected');
        applyTheme(t.id);
        updateLivePreview();
      });
      opt.appendChild(swatch);
      opt.appendChild(label);
      themeGrid.appendChild(opt);
    });
  }

  // ---- EVENTS ----
  function bindEvents() {
    inpName.addEventListener('input', updateLivePreview);

    emojiCustom.addEventListener('input', () => {
      const val = emojiCustom.value.trim();
      emojiGrid.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      if (val) {
        selectedEmoji = val;
      } else {
        selectedEmoji = EMOJIS[0];
        emojiGrid.querySelectorAll('.emoji-btn').forEach(b => {
          if (b.textContent === EMOJIS[0]) b.classList.add('selected');
        });
      }
      updateLivePreview();
    });

    btnCreate.addEventListener('click', copyShareLink);
    btnFullscreen.addEventListener('click', () => {
      const url = buildShareURL();
      if (url) {
        autoStart = true;
        window.location.hash = url.split('#')[1];
      }
    });
    btnToggle.addEventListener('click', onToggle);
    btnReset.addEventListener('click', onReset);
    btnShare.addEventListener('click', shareTimer);
    btnNew.addEventListener('click', () => { window.location.hash = ''; route(); });

    window.addEventListener('hashchange', route);

    updateLivePreview();
    previewInterval = setInterval(updateLivePreview, 1000);
  }

  // ---- ROUTING ----
  function route() {
    const params = parseHash();
    if (params && params.d) showTimer(params);
    else showCreator();
  }

  function parseHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    const params = {};
    hash.split('&').forEach(pair => {
      const [k, ...rest] = pair.split('=');
      if (k && rest.length) params[k] = decodeURIComponent(rest.join('='));
    });
    return params;
  }

  // ---- CREATOR ----
  function showCreator() {
    creator.classList.add('active');
    timerEl.classList.remove('active');
    stopTick();
    confettiActive = false;
    document.title = 'Clockdown Timer — Countdown From Any Duration';
    applyTheme(selectedTheme);
    updateLivePreview();
  }

  function fmtUnits(ms) {
    const total = Math.max(0, Math.round(ms / 1000));
    return {
      h: Math.floor(total / 3600),
      m: Math.floor((total % 3600) / 60),
      s: total % 60,
    };
  }

  function updateLivePreview() {
    const name = inpName.value.trim();
    $('#lp-emoji').textContent = selectedEmoji;
    $('#lp-name').textContent = name || 'Your Timer Name';
    $('#lp-name').classList.toggle('placeholder', !name);

    const sec = totalSeconds();
    btnCreate.disabled = sec <= 0;
    btnFullscreen.style.display = sec > 0 ? '' : 'none';

    const u = fmtUnits(sec * 1000);
    $('#lp-hours').textContent = String(u.h).padStart(2, '0');
    $('#lp-mins').textContent = String(u.m).padStart(2, '0');
    $('#lp-secs').textContent = String(u.s).padStart(2, '0');
  }

  function buildShareURL() {
    const sec = totalSeconds();
    if (sec <= 0) return null;
    const name = inpName.value.trim();
    let hash = `d=${sec}`;
    if (name) hash += `&n=${encodeURIComponent(name)}`;
    hash += `&e=${encodeURIComponent(selectedEmoji)}`;
    if (selectedTheme !== 'galaxy') hash += `&bg=${selectedTheme}`;
    return window.location.origin + window.location.pathname + '#' + hash;
  }

  function copyShareLink() {
    const url = buildShareURL();
    if (!url) return;
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied! Share it anywhere');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Link copied! Share it anywhere');
    });
  }

  // ---- FULL TIMER ----
  function showTimer(params) {
    creator.classList.remove('active');
    timerEl.classList.add('active');

    const sec = Math.max(1, Math.floor(parseFloat(params.d) || 0));
    const name = params.n || '';
    const emoji = params.e || '⏲️';
    const theme = params.bg || 'galaxy';

    totalMs = sec * 1000;
    remainingMs = totalMs;
    running = false;
    finished = false;
    stopTick();
    confettiActive = false;

    $('#tm-emoji').textContent = emoji;
    $('#tm-name').textContent = name;
    $('#tm-name').style.display = name ? '' : 'none';
    $('#tm-grid').style.display = 'flex';
    $('#tm-grid').classList.remove('finished');
    $('#tm-celebration').style.display = 'none';

    document.title = name ? `${name} — Clockdown Timer` : 'Clockdown Timer';
    applyTheme(theme);

    btnToggle.textContent = 'Start';
    btnReset.disabled = true;
    renderTimer();

    // Creator hit "Start ↗" — launch the running timer in one click.
    if (autoStart) {
      autoStart = false;
      onToggle();
    }
  }

  function renderTimer() {
    const u = fmtUnits(remainingMs);
    setDigit('#tm-hours', String(u.h).padStart(2, '0'));
    setDigit('#tm-mins', String(u.m).padStart(2, '0'));
    setDigit('#tm-secs', String(u.s).padStart(2, '0'));
  }

  const prevDigits = {};
  function setDigit(sel, val) {
    const el = $(sel);
    if (prevDigits[sel] === val) return;
    el.textContent = val;
    el.classList.remove('digit-flip');
    void el.offsetWidth;
    el.classList.add('digit-flip');
    prevDigits[sel] = val;
  }

  function onToggle() {
    if (finished) { onReset(); return; }
    if (running) {
      // pause
      remainingMs = Math.max(0, endAt - Date.now());
      running = false;
      stopTick();
      btnToggle.textContent = 'Resume';
    } else {
      // start / resume
      endAt = Date.now() + remainingMs;
      running = true;
      btnReset.disabled = false;
      btnToggle.textContent = 'Pause';
      startTick();
    }
  }

  function onReset() {
    stopTick();
    running = false;
    finished = false;
    remainingMs = totalMs;
    confettiActive = false;
    $('#tm-grid').style.display = 'flex';
    $('#tm-grid').classList.remove('finished');
    $('#tm-celebration').style.display = 'none';
    btnToggle.textContent = 'Start';
    btnReset.disabled = true;
    renderTimer();
  }

  function startTick() {
    stopTick();
    tickInterval = setInterval(() => {
      const left = endAt - Date.now();
      if (left <= 0) {
        remainingMs = 0;
        renderTimer();
        finish();
        return;
      }
      remainingMs = left;
      renderTimer();
    }, 100);
  }

  function stopTick() {
    if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
  }

  function finish() {
    stopTick();
    running = false;
    finished = true;
    remainingMs = 0;
    renderTimer();
    $('#tm-grid').classList.add('finished');
    const cel = $('#tm-celebration');
    cel.textContent = `Time's up! ${$('#tm-emoji').textContent}`;
    cel.style.display = 'block';
    btnToggle.textContent = 'Restart';
    document.title = '⏰ Time\'s up! — Clockdown Timer';
    startConfetti();
  }

  function shareTimer() {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: document.title, url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => {});
    }
  }

  // ---- THEME ----
  function applyTheme(themeId) {
    const t = THEME_STYLES[themeId] || THEME_STYLES.galaxy;
    const root = document.documentElement;
    root.style.setProperty('--accent', t.accent);
    root.style.setProperty('--accent-bright', t.accentBright);
    root.style.setProperty('--gradient', t.gradient);
    root.style.setProperty('--accent-glow', t.accent + '40');
    $('.bg-gradient').style.background = t.bgGrad;
  }

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }

  // ---- CONFETTI ----
  function startConfetti() {
    if (confettiActive) return;
    confettiActive = true;
    const canvas = $('#confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#c084fc','#e879f9','#fb7185','#facc15','#38bdf8','#a3e635','#f97316'];
    const particles = [];
    for (let i = 0; i < 200; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        w: Math.random() * 10 + 5, h: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2,
        rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 10, opacity: 1,
      });
    }
    let frame = 0;
    function draw() {
      if (!confettiActive) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        if (p.opacity <= 0) return;
        alive = true;
        p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rot += p.rotV;
        if (frame > 120) p.opacity -= 0.008;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      frame++;
      if (alive) requestAnimationFrame(draw);
      else confettiActive = false;
    }
    draw();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }, { once: true });
  }

  init();
})();
</script>
